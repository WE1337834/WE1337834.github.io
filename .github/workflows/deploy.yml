name: Deploy Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g uglify-js
          npm install -g clean-css-cli

      - name: Minify CSS
        run: |
          cleancss -o style.min.css style.css
          cleancss -o admin-style.min.css admin-style.css

      - name: Minify JavaScript
        run: |
          uglifyjs script.js -o script.min.js
          uglifyjs admin-script.js -o admin-script.min.js
          uglifyjs i18n.js -o i18n.min.js
          uglifyjs seo.js -o seo.min.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true

      - name: Send Telegram notification
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="✅ Новый деплой портфолио успешно выполнен!%0A%0A🔗 https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"