<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админка — Проекты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>
    <header class="admin-header">
        <div class="container header-content">
            <h1>Управление контентом</h1>
            <div class="admin-nav">
                <a href="index.html" class="back-site-link">← На сайт</a>
                <button id="logout-btn" style="display: none;">Выйти</button>
            </div>
        </div>
    </header>

    <main class="container admin-main">
        <div id="login-form" class="login-box">
            <h2>Доступ в панель</h2>
            <form>
                <div class="input-block">
                    <label for="admin-password">Пароль администратора</label>
                    <input type="password" id="admin-password" required>
                </div>
                <button type="submit" class="btn-submit">Войти</button>
            </form>
        </div>

        <div id="admin-panel" style="display: none;">
            <div class="grid-container">
                <div class="panel-section">
                    <h2 id="form-action-title">Добавить проект</h2>
                    <form id="project-form">
                        <div class="input-block">
                            <label for="title">Название проекта *</label>
                            <input type="text" id="title" required>
                        </div>
                        <div class="input-block">
                            <label for="description">Описание</label>
                            <textarea id="description" rows="5"></textarea>
                        </div>
                        <div class="input-block">
                            <label for="technologies">Технологии (через запятую)</label>
                            <input type="text" id="technologies" placeholder="HTML, CSS, JavaScript">
                        </div>
                        <div class="input-block">
                            <label for="github_link">Ссылка на GitHub</label>
                            <input type="url" id="github_link">
                        </div>
                        <div class="input-block">
                            <label for="demo_link">Ссылка на Демо</label>
                            <input type="url" id="demo_link">
                        </div>
                        <div class="btn-row">
                            <button type="submit" class="btn-submit">Опубликовать</button>
                            <button type="button" onclick="resetForm()" class="btn-cancel">Очистить</button>
                        </div>
                    </form>
                </div>

                <div class="panel-section">
                    <h2>База проектов</h2>
                    <div id="projects-list">
                        <p class="empty-text">Список пуст.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="admin-script.js"></script>
</body>
</html>
